spring.application.name=hisaabai
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/hisaabai}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:your-256-bit-secret-your-256-bit-secret}
jwt.expiration=86400000
cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://your-app.vercel.app}

server.port=${PORT:8080}
